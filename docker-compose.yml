services:
  app:
    build:
      args:
        user: developer
        uid: 1000
      context: ./
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel-app-r
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - laravel

  db:
    image: mysql:8.0
    container_name: laravel-mysql-r
    restart: unless-stopped
    ports:
      - "33808:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-sail}
    volumes:
      - ./docker-compose/mysql/data:/var/lib/mysql
      - ./docker-compose/mysql/logs:/var/log/mysql
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
      retries: 3
      timeout: 5s

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx-r
    restart: unless-stopped
    ports:
      - "8042:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: laravel-phpmyadmin-r
    ports:
      - "8045:80"
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - laravel

  redis:
    image: redis:alpine
    container_name: laravel-redis-r
    restart: unless-stopped
    volumes:
      - ./docker-compose/redis/data:/data
    ports:
      - "16390:6379"
    networks:
      - laravel

  node:
    image: node:22-alpine
    container_name: laravel-r-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "5174:5173"
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
    driver: bridge
